<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | SURE SHOT</title>
  <meta name="description" content="SURE SHOT へのお問い合わせ — コラボレーション・タイアップ・出演のご相談。">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+JP:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">

  <div class="grain" aria-hidden="true"></div>
  <div data-nav></div>

  <!-- ===================== CONTACT ===================== -->
  <section class="section page-section" id="contact">
    <div class="container container--narrow">
      <div class="section__header fade-in">
        <p class="section__label">CONTACT</p>
        <h2 class="section__title">お問い合わせ</h2>
        <p class="section__desc">
          コラボレーション・タイアップのご相談、出演のご希望は以下のフォームからお気軽にご連絡ください。<br>
          内容を確認の上、担当者よりご連絡いたします。
        </p>
      </div>

      <form class="apply-form fade-in" id="contactForm"
            name="contact" method="post"
            data-netlify="true" netlify-honeypot="bot-field"
            novalidate>
        <input type="hidden" name="form-name" value="contact">
        <p class="form-honeypot" aria-hidden="true">
          <label>Don't fill this out: <input name="bot-field" tabindex="-1" autocomplete="off"></label>
        </p>
        <div class="form-group">
          <label class="form-label" for="inquiryType">ご相談内容 <span class="required" aria-label="必須">*</span></label>
          <select class="form-input form-select" id="inquiryType" name="inquiryType" required>
            <option value="">選択してください</option>
            <option value="collab">コラボレーションのご相談</option>
            <option value="tieup">タイアップのご相談</option>
            <option value="apply">出演希望</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="name">お名前 / アーティスト名 <span class="required" aria-label="必須">*</span></label>
          <input class="form-input" type="text" id="name" name="name" placeholder="お名前、またはアーティスト名" required autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">メールアドレス <span class="required" aria-label="必須">*</span></label>
          <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="message">メッセージ</label>
          <textarea class="form-input form-textarea" id="message" name="message" placeholder="ご相談・ご希望の詳細をご自由にご記入ください（自己紹介、SNS・音源リンク、ご希望の時期、企画内容など）" rows="7"></textarea>
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--large">
          送信する
        </button>
        <p class="form-note" id="formNote" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <div data-footer></div>

  <script src="data/events.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
